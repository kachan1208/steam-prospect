# DigitalOcean App Platform spec for Prospect.
#
# Two ways to use it:
#   • UI (easiest): DO panel → Apps → Create → connect GitHub → pick this repo. DO auto-detects
#     the Dockerfile; you only add the env vars below in the "Environment Variables" step.
#   • CLI: `doctl apps create --spec .do/app.yaml` (after editing the two placeholders).
#
# Edit the two ⬇ placeholders before using the CLI path.

name: prospect
region: nyc

services:
  - name: web
    # --- source: build from your GitHub repo, redeploy automatically on push ---
    github:
      repo: YOUR_GITHUB_USERNAME/prospect   # ⬅ change to your repo (owner/name)
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile
    source_dir: /

    # --- runtime ---
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs           # 512MB / ~$5/mo. Bump to a 1GB slug if it OOMs.
    health_check:
      http_path: /api/health
      initial_delay_seconds: 45             # allow time for the first DuckDB download on boot

    envs:
      # The API downloads the analytics DB from here on boot (a GitHub Release asset, ≤2GB).
      - key: PROSPECT_DUCKDB_URL
        scope: RUN_TIME
        value: https://github.com/YOUR_GITHUB_USERNAME/prospect/releases/download/data-latest/current.duckdb  # ⬅ change
      # These match the Dockerfile defaults; listed so they're visible/overridable in the UI.
      - key: PROSPECT_STATIC_DIR
        scope: RUN_TIME
        value: /app/web_dist

# Route all traffic to the single web service (it serves both the SPA and /api).
ingress:
  rules:
    - match:
        path:
          prefix: /
      component:
        name: web
