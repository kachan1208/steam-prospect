# The spec the LIVE app was actually created from (via `doctl apps create --spec`).
# Uses a `git:` source (public clone URL) instead of the `github:` integration in app.yaml,
# so it deploys headlessly with no GitHub-authorize browser step. Trade-off: no
# auto-deploy-on-push — after pushing changes, redeploy with:
#     doctl apps create-deployment f069bc96-4278-4765-aef7-fb967bd9aafa
# To change config (env vars, size, …) edit this file then:
#     doctl apps update f069bc96-4278-4765-aef7-fb967bd9aafa --spec .do/app.git.yaml
# To enable auto-deploy-on-push instead, connect the GitHub integration in the DO UI and
# switch to the `github:` source in app.yaml.

name: prospect
region: nyc
services:
  - name: web
    git:
      repo_clone_url: https://github.com/kachan1208/steam-prospect.git
      branch: main
    dockerfile_path: Dockerfile
    source_dir: /
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /api/health
      initial_delay_seconds: 45
    envs:
      - key: PROSPECT_DUCKDB_URL
        scope: RUN_TIME
        value: https://github.com/kachan1208/steam-prospect/releases/download/data-latest/current.duckdb
      - key: PROSPECT_STATIC_DIR
        scope: RUN_TIME
        value: /app/web_dist

ingress:
  rules:
    - match:
        path:
          prefix: /
      component:
        name: web
